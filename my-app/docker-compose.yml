services:
  # 1. 資料庫
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always
    deploy:
      resources:
        limits:
          memory: 256M
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}" ]
      interval: 5s
      timeout: 5s
      retries: 5

  # 2. .NET 9 Web API
  api:
    build: ./api
    image: my-dotnet-api:${APP_VERSION}
    environment:
      ConnectionStrings__Default: "Host=db;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}"
      APP_VERSION: ${APP_VERSION}
      ASPNETCORE_URLS: http://+:8080
    depends_on:
      db:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 256M

  # 3. Vue3 frontend build container (copies dist to shared volume)
  frontend:
    build: ./frontend
    image: my-frontend:${APP_VERSION}
    volumes:
      - frontend_dist:/dist
    restart: "no"

  # 4. Nginx 反向代理 + 靜態檔案
  nginx:
    image: nginx:alpine
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - frontend_dist:/usr/share/nginx/html:ro
    ports:
      - "${NGINX_PORT}:80"
    depends_on:
      api:
        condition: service_started
      frontend:
        condition: service_completed_successfully
    deploy:
      resources:
        limits:
          memory: 64M

volumes:
  postgres_data:
  frontend_dist:

