<!DOCTYPE html>
<html>

<head>
    <style>
        html {
            background: #ffffff;
        }

        body {
            width: 720pt;
            height: 405pt;
            margin: 0;
            padding: 0;
            background: #F4F6F6;
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
        }

        .header {
            background: #1C2833;
            padding: 15pt 30pt;
            color: #FFFFFF;
        }

        h1 {
            margin: 0;
            font-size: 28pt;
        }

        .content {
            padding: 20pt;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            flex: 1;
        }

        .box {
            background: #FFFFFF;
            border-left: 8pt solid #2E4053;
            padding: 15pt 30pt;
            border-radius: 4pt;
            box-shadow: 2px 2px 10px rgba(0, 0, 0, 0.1);
            width: 500pt;
        }

        h2 {
            color: #1C2833;
            font-size: 20pt;
            margin-top: 0;
            margin-bottom: 10pt;
        }

        ul {
            margin: 0;
            padding-left: 20pt;
        }

        li {
            font-size: 14pt;
            margin-bottom: 8pt;
            line-height: 1.3;
            color: #333333;
        }
    </style>
</head>

<body>
    <div class="header">
        <h1>前端與 UI 框架規範</h1>
    </div>
    <div class="content">
        <div class="box">
            <h2>Vue 3 Composition API & TypeScript</h2>
            <ul>
                <li>從 jQuery 自然過渡，使用 <b>Vite</b> 加速開發建置</li>
                <li>採用 <b>TypeScript (strict)</b> 提升安全防護</li>
                <li>使用 <b>PrimeVue</b> 作為企業元件庫（表格、彈窗）</li>
                <li>以 <b>Axios</b> 取代原本的 $.ajax 進行 API 管理</li>
                <li>全域狀態透過 <b>Pinia</b> 控制，路由依靠 <b>Vue Router</b></li>
            </ul>
        </div>
    </div>
</body>

</html>
